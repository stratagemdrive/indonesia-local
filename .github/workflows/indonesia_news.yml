name: Indonesia News Scraper

on:
  schedule:
    - cron: "0 11 * * *"   # 6 AM EST (UTC-5) / 11:00 UTC
    - cron: "0 23 * * *"   # 6 PM EST (UTC-5) / 23:00 UTC
  workflow_dispatch:

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python fetch_indonesia_news.py

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/indonesia_news.json
          git diff --cached --quiet || git commit -m "chore: update indonesia_news.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin main
